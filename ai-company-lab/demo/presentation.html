<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1440">
<title>AI Company Lab - サイトデモ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #fff;
    font-family: 'Noto Sans JP', sans-serif;
    overflow: hidden;
    width: 1440px;
    height: 900px;
  }

  /* ── Title slide ── */
  .title-slide {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: radial-gradient(ellipse at 50% 40%, rgba(217,171,111,.12) 0%, transparent 60%), #0a0a0f;
    z-index: 100;
    opacity: 1;
    transition: opacity .8s ease;
  }
  .title-slide.hidden { opacity: 0; pointer-events: none; }
  .title-slide h1 {
    font-size: 56px; font-weight: 900;
    background: linear-gradient(135deg, #d9ab6f 0%, #f0d4a8 50%, #d9ab6f 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 16px; letter-spacing: -0.02em;
  }
  .title-slide p {
    font-size: 20px; color: rgba(255,255,255,.5);
    margin-bottom: 8px;
  }
  .title-slide .subtitle {
    font-size: 15px; color: rgba(255,255,255,.3);
    margin-top: 24px;
  }
  .title-slide .start-btn {
    margin-top: 40px;
    background: linear-gradient(135deg, #d9ab6f 0%, #f0d4a8 100%);
    color: #0a0a0f;
    border: none;
    padding: 14px 40px;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.05em;
    transition: transform .2s, box-shadow .2s;
  }
  .title-slide .start-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(217,171,111,.3);
  }

  /* ── Ending slide ── */
  .ending-slide {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: radial-gradient(ellipse at 50% 40%, rgba(217,171,111,.12) 0%, transparent 60%), #0a0a0f;
    z-index: 100;
    opacity: 0; pointer-events: none;
    transition: opacity .8s ease;
  }
  .ending-slide.visible { opacity: 1; }
  .ending-slide h2 {
    font-size: 48px; font-weight: 900;
    background: linear-gradient(135deg, #d9ab6f 0%, #f0d4a8 50%, #d9ab6f 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 20px;
  }
  .ending-slide p {
    font-size: 18px; color: rgba(255,255,255,.5);
    line-height: 1.8;
    text-align: center;
  }
  .ending-slide .url {
    margin-top: 32px;
    font-size: 16px;
    color: #d9ab6f;
    letter-spacing: 0.05em;
  }

  /* ── Screenshot container ── */
  .scene {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transition: opacity .6s ease;
  }
  .scene.active { opacity: 1; }

  .scene img {
    width: 1200px;
    height: 750px;
    object-fit: cover;
    object-position: top center;
    border-radius: 12px;
    box-shadow: 0 0 80px rgba(217,171,111,.08), 0 20px 60px rgba(0,0,0,.5);
    border: 1px solid rgba(255,255,255,.06);
  }

  /* ── Narration bar ── */
  .narration {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, rgba(10,10,15,.97) 0%, rgba(10,10,15,.85) 70%, transparent 100%);
    padding: 32px 60px 28px;
    z-index: 50;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity .5s ease .3s, transform .5s ease .3s;
  }
  .narration.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .narration .label {
    font-size: 11px;
    color: #d9ab6f;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    margin-bottom: 8px;
  }
  .narration .text {
    font-size: 18px;
    color: rgba(255,255,255,.85);
    line-height: 1.7;
    max-width: 900px;
  }

  /* ── Progress bar ── */
  .progress {
    position: fixed; top: 0; left: 0;
    height: 3px;
    background: linear-gradient(90deg, #d9ab6f, #f0d4a8);
    z-index: 200;
    width: 0%;
    transition: width .3s linear;
  }

  /* ── Scene counter ── */
  .counter {
    position: fixed; top: 20px; right: 32px;
    font-size: 13px; color: rgba(255,255,255,.3);
    z-index: 200;
    font-variant-numeric: tabular-nums;
  }

  /* ── Speaking indicator ── */
  .speaking-indicator {
    position: fixed; top: 20px; left: 32px;
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: rgba(255,255,255,.4);
    z-index: 200;
    opacity: 0;
    transition: opacity .3s;
  }
  .speaking-indicator.active { opacity: 1; }
  .speaking-indicator .wave {
    display: flex; align-items: center; gap: 2px; height: 16px;
  }
  .speaking-indicator .wave span {
    display: block; width: 3px; border-radius: 2px;
    background: #d9ab6f;
    animation: wave 1s ease-in-out infinite;
  }
  .speaking-indicator .wave span:nth-child(1) { height: 6px; animation-delay: 0s; }
  .speaking-indicator .wave span:nth-child(2) { height: 12px; animation-delay: .15s; }
  .speaking-indicator .wave span:nth-child(3) { height: 8px; animation-delay: .3s; }
  .speaking-indicator .wave span:nth-child(4) { height: 14px; animation-delay: .45s; }
  .speaking-indicator .wave span:nth-child(5) { height: 6px; animation-delay: .6s; }
  @keyframes wave {
    0%, 100% { transform: scaleY(1); }
    50% { transform: scaleY(.4); }
  }

  /* ── Controls ── */
  .controls {
    position: fixed; bottom: 20px; right: 32px;
    display: flex; gap: 12px;
    z-index: 200;
  }
  .controls button {
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.1);
    color: rgba(255,255,255,.6);
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    transition: all .2s;
  }
  .controls button:hover {
    background: rgba(255,255,255,.15);
    color: #fff;
  }
  .controls .mute-btn.muted {
    color: rgba(255,100,100,.6);
    border-color: rgba(255,100,100,.2);
  }
</style>
</head>

const narrationEl = document.getElementById('narration');

const pauseBtn = document.getElementById('pauseBtn');
const muteBtn = document.getElementById('muteBtn');
const startBtn = document.getElementById('startBtn');
const speakingIndicator = document.getElementById('speakingIndicator');

// Pre-create scene elements

  const div = document.createElement('div');
  div.className = 'scene';
  div.id = `scene-${i}`;
  div.innerHTML = `<img src="${scene.img}" alt="${scene.label}">`;
  scenesContainer.appendChild(div);
});

// ── State ──
let currentScene = -1;
let paused = false;
let muted = false;
let timer = null;
let speechStarted = false;
const TITLE_DURATION = 4000;
const totalScenes = SCENES.length;

// ── Speech Synthesis ──
const synth = window.speechSynthesis;
let jaVoice = null;

function loadVoices() {
  const voices = synth.getVoices();
  console.log('All voices:', voices.map(v => `${v.name} [${v.lang}]`).join(', '));

  const jaVoices = voices.filter(v => v.lang === 'ja-JP' || v.lang.startsWith('ja'));
  console.log('Japanese voices:', jaVoices.map(v => v.name));

  // Prefer Neural/Online voices (Edge) for smoother, more natural speech
  const preferred = ['Nanami Online', 'Nanami', 'Sayaka Online', 'Sayaka', 'Ayumi Online', 'Ayumi', 'Haruka'];
  for (const name of preferred) {
    const found = jaVoices.find(v => v.name.includes(name));
    if (found) { jaVoice = found; break; }
  }
  if (!jaVoice) jaVoice = jaVoices[0] || null;

  if (jaVoice) console.log('Selected voice:', jaVoice.name, jaVoice.lang);
  else console.warn('No Japanese voice found');
}

if (synth.onvoiceschanged !== undefined) {
  synth.onvoiceschanged = loadVoices;
}
loadVoices();

function speak(text) {
  return new Promise((resolve) => {
    synth.cancel();
    speakingIndicator.classList.remove('active');

    if (muted || !text) {
      resolve();
      return;
    }

    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'ja-JP';
    utter.rate = 0.95;
    utter.pitch = 1.1;
    utter.volume = 1.0;
    if (jaVoice) utter.voice = jaVoice;

    utter.onstart = () => {
      speakingIndicator.classList.add('active');
    };
    utter.onend = () => {
      speakingIndicator.classList.remove('active');
      resolve();
    };
    utter.onerror = (e) => {
      speakingIndicator.classList.remove('active');
      console.warn('Speech error:', e.error);
      resolve();
    };

    synth.speak(utter);
  });
}

function stopSpeech() {
  synth.cancel();
  speakingIndicator.classList.remove('active');
}

// ── Scene management ──
async function showScene(index) {
  clearTimeout(timer);
  stopSpeech();

  document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
  narrationEl.classList.remove('visible');

  if (index === -1) {
    titleSlide.classList.remove('hidden');
    endingSlide.classList.remove('visible');
    counterEl.textContent = '';
    progressEl.style.width = '0%';
    currentScene = -1;
    return;
  }

  if (index >= totalScenes) {
    endingSlide.classList.add('visible');
    titleSlide.classList.add('hidden');
    narrationEl.classList.remove('visible');
    counterEl.textContent = '';
    progressEl.style.width = '100%';
    currentScene = totalScenes;

    if (!muted) {
      await speak('ご覧いただきありがとうございました。');
    }
    return;
  }

  titleSlide.classList.add('hidden');
  endingSlide.classList.remove('visible');
  currentScene = index;

  const scene = SCENES[index];
  const sceneEl = document.getElementById(`scene-${index}`);
  sceneEl.classList.add('active');

  setTimeout(() => {
    narrationLabel.textContent = scene.label;
    narrationText.textContent = scene.text;
    narrationEl.classList.add('visible');
  }, 200);

  counterEl.textContent = `${index + 1} / ${totalScenes}`;
  progressEl.style.width = `${((index + 1) / totalScenes) * 100}%`;

  const speechText = scene.speech || scene.text;

  if (muted) {
    const fallbackDuration = Math.max(4000, speechText.length * 120);
    scheduleNext(fallbackDuration);
  } else {
    await new Promise(r => setTimeout(r, 600));

    if (currentScene !== index) return;

    await speak(speechText);

    if (currentScene !== index) return;

    if (!paused) {
      timer = setTimeout(() => {
        showScene(currentScene + 1);
      }, 1500);
    }
  }
}

function scheduleNext(duration) {
  clearTimeout(timer);
  if (!paused) {
    timer = setTimeout(() => {
      showScene(currentScene + 1);
    }, duration);
  }
}

// ── Controls ──
function togglePause() {
  paused = !paused;
  pauseBtn.textContent = paused ? '▶ 再生' : '⏸ 一時停止';
  if (paused) {
    clearTimeout(timer);
    if (synth.speaking) synth.pause();
  } else {
    if (synth.paused) {
      synth.resume();
    } else if (currentScene >= 0 && currentScene < totalScenes) {
      showScene(currentScene);
    }
  }
}

function toggleMute() {
  muted = !muted;
  muteBtn.textContent = muted ? '🔇 音声OFF' : '🔊 音声ON';
  muteBtn.classList.toggle('muted', muted);
  if (muted) {
    stopSpeech();
  }
}

function skipToNext() {
  if (currentScene < totalScenes) {
    showScene(currentScene + 1);
  }
}

// ── Start button (user gesture required for Speech API) ──
startBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  speechStarted = true;

  const warmup = new SpeechSynthesisUtterance('');
  warmup.lang = 'ja-JP';
  warmup.volume = 0;
  synth.speak(warmup);

  speak('AIカンパニーラボ、サイトデモンストレーションを開始します。').then(() => {
    if (!paused) {
      timer = setTimeout(() => showScene(0), 800);
    }
  });

  titleSlide.classList.add('hidden');
});

// Keyboard controls
document.addEventListener('keydown', (e) => {
  if (e.key === ' ' || e.key === 'Space') {
    e.preventDefault();
    if (!speechStarted) {
      startBtn.click();
      return;
    }
    togglePause();
  } else if (e.key === 'ArrowRight' || e.key === 'Enter') {
    if (!speechStarted) { startBtn.click(); return; }
    skipToNext();
  } else if (e.key === 'ArrowLeft') {
    if (currentScene > 0) showScene(currentScene - 1);
    else if (currentScene === 0) showScene(-1);
  } else if (e.key === 'm' || e.key === 'M') {
    toggleMute();
  }
});

// Show title slide initially (no auto-start — wait for user click)
showScene(-1);
</script>
